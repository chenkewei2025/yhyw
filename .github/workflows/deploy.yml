name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          REMOTE_DIR: ${{ secrets.REMOTE_DIR }}
          COMPOSE_DIR: ${{ secrets.COMPOSE_DIR }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
          HEALTH_URL: ${{ secrets.HEALTH_URL }}
        run: |
          missing=0
          for name in SSH_PRIVATE_KEY SERVER_HOST SERVER_USER REMOTE_DIR COMPOSE_DIR SERVICE_NAME HEALTH_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing repository secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync files to server
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_DIR: ${{ secrets.REMOTE_DIR }}
        run: |
          rsync -avz \
            --rsync-path="sudo rsync" \
            --exclude node_modules \
            --exclude .git \
            --exclude .env* \
            --exclude .DS_Store \
            --exclude npm-debug.log \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./ "$SERVER_USER@$SERVER_HOST:$REMOTE_DIR/"

      - name: Restart service on server
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          COMPOSE_DIR: ${{ secrets.COMPOSE_DIR }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            "$SERVER_USER@$SERVER_HOST" \
            "cd $COMPOSE_DIR && \
             docker compose up -d --no-build $SERVICE_NAME && \
             docker compose restart $SERVICE_NAME"

      - name: Health check
        env:
          HEALTH_URL: ${{ secrets.HEALTH_URL }}
        run: |
          for i in $(seq 1 15); do
            if curl -fsS "$HEALTH_URL" > /dev/null 2>&1; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i/15 - waiting..."
            sleep 2
          done
          echo "Health check failed!"
          exit 1
